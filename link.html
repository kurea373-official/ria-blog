<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Tea Official — OMIKUJI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 背景のラグジュアリーティードロップエフェクト -->
<div class="bubble-ambient" id="bubble-ambient"></div>

<div class="app-container">

    <!-- 多層ガラスのヘッダー -->
    <header class="glass-header">
        <div class="logo-area">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 50" class="sig-logo">
                <defs>
                    <filter id="premiumGlow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#d97706" flood-opacity="0.25"/>
                    </filter>
                    <linearGradient id="appleTeaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#fbbf24" />
                        <stop offset="60%" stop-color="#d97706" />
                        <stop offset="100%" stop-color="#9d174d" />
                    </linearGradient>
                </defs>
                <g filter="url(#premiumGlow)" transform="translate(0, 2)">
                    <circle cx="26" cy="24" r="16" fill="none" stroke="url(#appleTeaGrad)" stroke-width="2.5" stroke-dasharray="75 25"/>
                    <path d="M26,14 C29,14 33,17 33,22 C33,28 26,33 26,33 C26,33 19,28 19,22 C19,17 23,14 26,14 Z" fill="url(#appleTeaGrad)" fill-opacity="0.2"/>
                    <circle cx="26" cy="23" r="4" fill="url(#appleTeaGrad)"/>
                    <path d="M27,13 C29,10 32,10 32,10" fill="none" stroke="url(#appleTeaGrad)" stroke-width="2" stroke-linecap="round"/>
                    <text x="60" y="32" font-family="'Plus Jakarta Sans', sans-serif" font-weight="300" font-size="24" fill="#9d174d" letter-spacing="1">Apple</text>
                    <text x="128" y="32" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="24" fill="url(#appleTeaGrad)" letter-spacing="1">Tea</text>
                    <text x="200" y="29" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="8" fill="#d97706" letter-spacing="6">OFFICIAL</text>
                </g>
            </svg>
        </div>

        <!-- 水平プレミアムナビ -->
        <nav class="top-nav">
            <a href="index.html">HOME</a>
            <a href="company.html">ABOUT</a>
            <a href="service.html">CONTENT</a>
            <a href="recruit.html">PROFILE</a>
            <a class="active" href="link.html">OMIKUJI</a>
            <a href="contact.html">CONTACT</a>
        </nav>

        <!-- コンパクト美麗時計 -->
        <div class="header-clock">
            <span id="clock-date">-- / -- / --</span>
            <span id="clock-time">00:00:00</span>
        </div>
    </header>

    <!-- メインレイアウト -->
    <div class="main-wrapper" style="grid-template-columns: 1fr;">
        
        <!-- おみくじ専用の美麗ガラスカード -->
        <main class="content-stream" style="max-width: 700px; margin: 0 auto; width: 100%;">
            <div class="stream-banner" style="text-align: center; margin-bottom: 35px;">
                <h2>Apple Tea OMIKUJI</h2>
                <p>今日の運勢と、あなたを引き立てるラッキー・ブレンドを占います</p>
            </div>

            <div class="modern-card" style="text-align: center; padding: 50px 30px;">
                <div class="card-glow-line"></div>
                
                <!-- 結果表示エリア（JSと完全連動） -->
                <div class="omikuji-display-area" style="min-height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 40px;">
                    <h1 id="omikuji-result" style="font-size: 32px; font-weight: 800; color: var(--tea-primary); margin-bottom: 20px; letter-spacing: 0.05em;">
                        ? ? ?
                    </h1>
                    <p id="omikuji-comment" style="font-size: 14px; line-height: 1.8; color: var(--tea-text); max-width: 450px; margin: 0 auto;">
                        下のボタンを押すと、特製の紅茶おみくじがブレンドされます。
                    </p>
                </div>

                <!-- おみくじを引くボタン（JSと完全連動） -->
                <button id="omikuji-btn" style="
                    background: var(--tea-gradient);
                    color: white;
                    border: none;
                    font-family: var(--font-en), var(--font-ja);
                    font-size: 16px;
                    font-weight: 700;
                    letter-spacing: 0.1em;
                    padding: 16px 48px;
                    border-radius: 16px;
                    cursor: pointer;
                    box-shadow: 0 10px 25px rgba(217, 119, 6, 0.25);
                    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
                ">
                    運勢をブレンドする
                </button>
            </div>
        </main>

    </div>
</div>

<!-- モバイルナビ -->
<nav class="floating-mobile-nav">
    <a href="index.html"><span>🏠</span><label>Home</label></a>
    <a href="service.html"><span>💻</span><label>Service</label></a>
    <a href="recruit.html"><span>👤</span><label>Profile</label></a>
    <a class="active" href="link.html"><span>🎲</span><label>Omikuji</label></a>
    <a href="contact.html"><span>✉</span><label>Contact</label></a>
</nav>

<!-- スタイル微調整用のインラインCSS（ホバーエフェクト等） -->
<style>
    #omikuji-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(217, 119, 6, 0.35);
        opacity: 0.95;
    }
    #omikuji-btn:active {
        transform: translateY(-1px);
    }
    #omikuji-btn:disabled {
        background: #ccc;
        box-shadow: none;
        cursor: not-allowed;
    }
</style>

<script src="js/script.js"></script>
</body>
</html>
